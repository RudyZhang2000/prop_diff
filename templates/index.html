<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Player Prop Diff</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
        header { background: #1a1d2e; padding: 14px 24px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid #2a2d42; }
        header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
        .status-text { font-size: 13px; color: #64748b; flex: 1; }
        .refresh-btn { background: #4f46e5; color: white; border: none; padding: 8px 18px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; transition: background 0.15s; }
        .refresh-btn:hover { background: #4338ca; }
        .refresh-btn:disabled { background: #2d3148; color: #64748b; cursor: not-allowed; }
        .controls { padding: 10px 24px; display: flex; gap: 10px; align-items: center; background: #13162b; border-bottom: 1px solid #2a2d42; }
        input[type=text], select {
            background: #1e2235; border: 1px solid #2a2d42; color: #e2e8f0;
            padding: 7px 12px; border-radius: 6px; font-size: 13px; outline: none;
        }
        input[type=text] { width: 220px; }
        input[type=text]:focus, select:focus { border-color: #4f46e5; }
        .count { padding: 8px 24px; font-size: 12px; color: #475569; background: #0f1117; border-bottom: 1px solid #1e2235; }
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        thead th {
            background: #13162b; padding: 9px 14px; text-align: left;
            font-weight: 600; color: #64748b; font-size: 11px;
            text-transform: uppercase; letter-spacing: 0.06em;
            position: sticky; top: 0; border-bottom: 1px solid #2a2d42;
            white-space: nowrap;
        }
        tbody tr { border-bottom: 1px solid #181b2e; transition: background 0.1s; }
        tbody tr:hover { background: #1a1d2e; }
        td { padding: 10px 14px; vertical-align: middle; }
        .sport-badge {
            display: inline-block; background: #1e2235; border: 1px solid #2a2d42;
            border-radius: 4px; padding: 2px 7px; font-size: 11px; color: #94a3b8;
            font-weight: 500; white-space: nowrap;
        }
        .line { font-weight: 700; font-size: 15px; }
        .pp-line { color: #60a5fa; }
        .ud-line { color: #a78bfa; }
        .dir-pp { font-size: 12px; color: #60a5fa; white-space: nowrap; }
        .dir-ud { font-size: 12px; color: #a78bfa; white-space: nowrap; }
        .dir-over { color: #34d399; }
        .dir-under { color: #f87171; }
        .pct { font-weight: 700; font-size: 14px; white-space: nowrap; }
        .pct-high { color: #34d399; }
        .pct-mid { color: #fbbf24; }
        .pct-low { color: #94a3b8; }
        .mult-good { color: #34d399; font-weight: 600; }
        .mult-ok { color: #fbbf24; font-weight: 600; }
        .mult-bad { color: #f87171; font-weight: 600; }
        .spinner {
            display: inline-block; width: 13px; height: 13px;
            border: 2px solid #4f46e5; border-top-color: transparent;
            border-radius: 50%; animation: spin 0.7s linear infinite;
            vertical-align: middle; margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty { text-align: center; padding: 60px; color: #475569; font-size: 14px; }
    </style>
</head>
<body>
    <header>
        <h1>⚡ Player Prop Diff</h1>
        <span class="status-text" id="statusText">No data loaded</span>
        <button class="refresh-btn" id="refreshBtn" onclick="startRefresh()">Refresh</button>
    </header>
    <div class="controls">
        <input type="text" id="searchInput" placeholder="🔍 Search player..." oninput="filterTable()">
        <select id="sportFilter" onchange="filterTable()">
            <option value="">All Sports</option>
        </select>
    </div>
    <div class="count" id="countText"></div>
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Player</th>
                    <th>Sport</th>
                    <th>Prop</th>
                    <th>PP Line</th>
                    <th>UD Line</th>
                    <th>Direction</th>
                    <th>% Diff</th>
                    <th>UD Mult</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="8" class="empty">Click <strong>Refresh</strong> to load props</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        let allDiffs = [];
        let polling = null;

        function startRefresh() {
            const btn = document.getElementById('refreshBtn');
            btn.disabled = true;
            setStatus('<span class="spinner"></span>Opening browser for PrizePicks...');
            fetch('/refresh', { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'already_loading') {
                        setStatus('Already loading...');
                        return;
                    }
                    polling = setInterval(checkStatus, 2000);
                });
        }

        function checkStatus() {
            fetch('/status')
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'loading') {
                        setStatus('<span class="spinner"></span>' + data.message);
                    } else if (data.status === 'done') {
                        clearInterval(polling);
                        document.getElementById('refreshBtn').disabled = false;
                        loadData();
                    } else if (data.status === 'error') {
                        clearInterval(polling);
                        document.getElementById('refreshBtn').disabled = false;
                        setStatus('❌ Error: ' + data.message);
                    }
                });
        }

        function loadData() {
            fetch('/data')
                .then(r => r.json())
                .then(data => {
                    allDiffs = data;
                    populateSportFilter();
                    filterTable();
                    setStatus('✅ ' + data.length + ' props found');
                });
        }

        function setStatus(html) {
            document.getElementById('statusText').innerHTML = html;
        }

        function populateSportFilter() {
            const sports = [...new Set(allDiffs.map(d => d.sport))].sort();
            const sel = document.getElementById('sportFilter');
            const current = sel.value;
            sel.innerHTML = '<option value="">All Sports</option>';
            sports.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s;
                opt.textContent = s;
                if (s === current) opt.selected = true;
                sel.appendChild(opt);
            });
        }

        function filterTable() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const sport = document.getElementById('sportFilter').value;
            const filtered = allDiffs.filter(d =>
                (!search || d.player.toLowerCase().includes(search)) &&
                (!sport || d.sport === sport)
            );
            document.getElementById('countText').textContent =
                filtered.length + ' props' + (allDiffs.length !== filtered.length ? ' (filtered from ' + allDiffs.length + ')' : '');
            renderTable(filtered);
        }

        function renderTable(diffs) {
            const tbody = document.getElementById('tableBody');
            if (diffs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="empty">No props match your filters</td></tr>';
                return;
            }
            tbody.innerHTML = '';
            diffs.forEach(d => {
                const pp = d.prizepicks_line;
                const ud = d.underdog_line;
                const pct = d.pct_diff;
                const mult = d.ud_relevant_mult;
                const ppIsLower = pp < ud;

                const pctClass = pct >= 15 ? 'pct-high' : pct >= 7 ? 'pct-mid' : 'pct-low';
                const multClass = mult >= 1.0 ? 'mult-good' : mult >= 0.9 ? 'mult-ok' : 'mult-bad';

                let dirHtml;
                if (ppIsLower) {
                    dirHtml = `<span class="dir-pp">PP <span class="dir-over">Over</span> ${pp}</span><br>
                               <span class="dir-ud">UD <span class="dir-under">Under</span> ${ud}</span>`;
                } else {
                    dirHtml = `<span class="dir-pp">PP <span class="dir-under">Under</span> ${pp}</span><br>
                               <span class="dir-ud">UD <span class="dir-over">Over</span> ${ud}</span>`;
                }

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${d.player}</td>
                    <td><span class="sport-badge">${d.sport}</span></td>
                    <td>${d.prop_type}</td>
                    <td class="line pp-line">${pp}</td>
                    <td class="line ud-line">${ud}</td>
                    <td>${dirHtml}</td>
                    <td class="pct ${pctClass}">${pct}%</td>
                    <td class="${multClass}">${mult}x</td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
